name: Build Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_ios_simulator:
        description: Build the iOS simulator artifact
        type: boolean
        default: true

permissions:
  contents: write

env:
  FLUTTER_CHANNEL: stable
  OFFLIMU_ENV: demo
  OFFLIMU_SYNC_MOCK: 'true'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify generated code is current
        run: bash scripts/verify_codegen.sh

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  android:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK and App Bundle
        run: |
          flutter build apk --release \
            --dart-define=OFFLIMU_ENV=${OFFLIMU_ENV} \
            --dart-define=OFFLIMU_SYNC_MOCK=${OFFLIMU_SYNC_MOCK} \
            --dart-define=OFFLIMU_NODE_ID=node-release-a \
            --dart-define=OFFLIMU_TCP_PORT=47831 \
            --dart-define=OFFLIMU_DISCOVERY_PORT=46700

          flutter build appbundle --release \
            --dart-define=OFFLIMU_ENV=${OFFLIMU_ENV} \
            --dart-define=OFFLIMU_SYNC_MOCK=${OFFLIMU_SYNC_MOCK} \
            --dart-define=OFFLIMU_NODE_ID=node-release-a \
            --dart-define=OFFLIMU_TCP_PORT=47831 \
            --dart-define=OFFLIMU_DISCOVERY_PORT=46700

      - name: Stage Android artifacts
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/offlimu-android.apk
          cp build/app/outputs/bundle/release/app-release.aab dist/offlimu-android.aab

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: dist/*
          if-no-files-found: error

  windows:
    needs: validate
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install dependencies
        shell: pwsh
        run: flutter pub get

      - name: Build Windows release
        shell: pwsh
        run: |
          flutter build windows --release `
            --dart-define=OFFLIMU_ENV=${env:OFFLIMU_ENV} `
            --dart-define=OFFLIMU_SYNC_MOCK=${env:OFFLIMU_SYNC_MOCK} `
            --dart-define=OFFLIMU_NODE_ID=node-win-release `
            --dart-define=OFFLIMU_TCP_PORT=47841 `
            --dart-define=OFFLIMU_DISCOVERY_PORT=46710

      - name: Stage Windows artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $source = 'build/windows/x64/runner/Release'
          $destination = 'dist/offlimu-windows.zip'
          if (Test-Path $destination) { Remove-Item $destination -Force }
          Compress-Archive -Path (Join-Path $source '*') -DestinationPath $destination

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: dist/offlimu-windows.zip
          if-no-files-found: error

  macos:
    needs: validate
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Ensure CocoaPods is available
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS release
        run: |
          flutter build macos --release \
            --dart-define=OFFLIMU_ENV=${OFFLIMU_ENV} \
            --dart-define=OFFLIMU_SYNC_MOCK=${OFFLIMU_SYNC_MOCK} \
            --dart-define=OFFLIMU_NODE_ID=node-mac-release \
            --dart-define=OFFLIMU_TCP_PORT=47851 \
            --dart-define=OFFLIMU_DISCOVERY_PORT=46720

      - name: Stage macOS artifact
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            build/macos/Build/Products/Release/offlimu.app \
            dist/offlimu-macos.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifact
          path: dist/offlimu-macos.zip
          if-no-files-found: error

  linux:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux release
        run: |
          flutter build linux --release \
            --dart-define=OFFLIMU_ENV=${OFFLIMU_ENV} \
            --dart-define=OFFLIMU_SYNC_MOCK=${OFFLIMU_SYNC_MOCK} \
            --dart-define=OFFLIMU_NODE_ID=node-linux-release \
            --dart-define=OFFLIMU_TCP_PORT=47861 \
            --dart-define=OFFLIMU_DISCOVERY_PORT=46730

      - name: Stage Linux artifact
        run: |
          mkdir -p dist
          tar -C build/linux/x64/release/bundle -czf dist/offlimu-linux.tar.gz .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: dist/offlimu-linux.tar.gz
          if-no-files-found: error

  ios-simulator:
    needs: validate
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.build_ios_simulator) }}
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Ensure CocoaPods is available
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS simulator artifact
        run: |
          flutter build ios --simulator --no-codesign \
            --dart-define=OFFLIMU_ENV=${OFFLIMU_ENV} \
            --dart-define=OFFLIMU_SYNC_MOCK=${OFFLIMU_SYNC_MOCK} \
            --dart-define=OFFLIMU_NODE_ID=node-ios-release \
            --dart-define=OFFLIMU_TCP_PORT=47871 \
            --dart-define=OFFLIMU_DISCOVERY_PORT=46740

      - name: Stage iOS simulator artifact
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            build/ios/iphonesimulator/Runner.app \
            dist/offlimu-ios-simulator.zip

      - name: Upload iOS simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-artifact
          path: dist/offlimu-ios-simulator.zip
          if-no-files-found: error

  publish-release:
    needs:
      - android
      - windows
      - macos
      - linux
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OffLiMU ${{ github.ref_name }}
          files: |
            release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}