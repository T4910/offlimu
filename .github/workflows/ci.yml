name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Verify generated code is current
        run: bash scripts/verify_codegen.sh

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
